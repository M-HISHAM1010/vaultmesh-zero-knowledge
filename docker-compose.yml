version: "3.9"

services:
  api:
    build:
      context: ./server
    container_name: vaultmesh-api
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"
    volumes:
      - vaultmesh_data:/app/data

  web:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: http://localhost:5000
    container_name: vaultmesh-web
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  vaultmesh_data:
