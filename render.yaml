services:
  - type: web
    name: vaultmesh-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: vaultmesh
      - key: MONGODB_STATE_COLLECTION
        value: vaultmesh_state
      - key: MAX_UPLOAD_BYTES
        value: "536870912"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "600"
      - key: AUTH_RATE_LIMIT_MAX
        value: "20"
      - key: DOWNLOAD_RATE_LIMIT_MAX
        value: "60"
